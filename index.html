<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghi âm WAV online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap&subset=vietnamese" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --bg: #f6f5f1;
      --card: #ffffff;
      --soft: #faf9f6;
      --line: #e5e1d8;
      --text: #1d1c18;
      --muted: #6f6a61;
      --primary: #0d6b6f;
      --primary-hover: #09575b;
      --danger: #b93163;
      --ok: #2f7a2f;
      --radius: 18px;
      --shadow: 0 10px 28px rgba(0,0,0,.06);
      --font: 'Be Vietnam Pro', Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    [data-theme="dark"] {
      --bg: #131311;
      --card: #1b1b19;
      --soft: #232320;
      --line: #31312d;
      --text: #f0eee8;
      --muted: #b0aba1;
      --primary: #67a9ad;
      --primary-hover: #83bcc0;
      --danger: #ef6c98;
      --ok: #87c487;
      --shadow: 0 10px 28px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea { font: inherit; }

    .wrap {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 14px 12px 26px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toolbar-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tool-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .hero {
      text-align: center;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 6vw, 36px);
      line-height: 1.15;
      font-weight: 700;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #bdb8af;
      flex: 0 0 auto;
    }

    .status.recording { color: var(--danger); }
    .status.recording .dot { background: var(--danger); }
    .status.ready { color: var(--ok); }
    .status.ready .dot { background: var(--ok); }

    .timer {
      text-align: center;
      font-size: clamp(44px, 12vw, 64px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 18px 0 10px;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin: 0 0 16px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    .meter {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--soft);
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .meter-fill {
      width: 6%;
      height: 100%;
      background: var(--primary);
      border-radius: inherit;
      transition: width 80ms linear;
    }

    .main-action {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .main-action:hover { background: var(--primary-hover); }
    .main-action.stop { background: var(--danger); }

    .secondary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .ghost {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .main-action:disabled,
    .ghost:disabled,
    .tool-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .file-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px dashed var(--line);
      background: var(--soft);
    }

    .file-title {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .file-meta {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    audio {
      width: 100%;
      margin-top: 12px;
    }

    .note {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 16px;
      padding-bottom: 6px;
    }

    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    @media (max-width: 420px) {
      .secondary-row { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .toolbar-group { justify-content: center; }
      .tool-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="toolbar">
      <div class="toolbar-group">
        <button id="langBtn" class="tool-btn" type="button" aria-label="Switch language">EN</button>
      </div>
      <div class="toolbar-group">
        <button id="themeBtn" class="tool-btn" type="button" aria-label="Chuyển giao diện">🌙</button>
      </div>
    </div>

    <section class="card hero">
      <h1 data-i18n="title">Ghi âm WAV</h1>
      <p class="sub" data-i18n="subtitle">Bấm ghi âm, nói xong thì dừng và tải file xuống.</p>
      <div id="status" class="status"><span class="dot"></span><span id="statusText">Sẵn sàng</span></div>
    </section>

    <section class="card">
      <div id="timer" class="timer">00:00</div>
      <p id="hint" class="hint">Cho phép dùng microphone khi trình duyệt hỏi.</p>
      <div class="meter" aria-hidden="true"><div id="meterFill" class="meter-fill"></div></div>

      <button id="mainBtn" class="main-action" type="button">Bắt đầu ghi âm</button>

      <div class="secondary-row">
        <button id="downloadBtn" class="ghost" type="button" disabled>Tải file WAV</button>
        <button id="resetBtn" class="ghost" type="button" disabled>Xóa bản ghi</button>
      </div>

      <div class="file-box">
        <p id="fileTitle" class="file-title">Chưa có bản ghi</p>
        <p id="fileMeta" class="file-meta">Sau khi dừng ghi, file sẽ hiện ở đây.</p>
        <audio id="player" controls hidden></audio>
      </div>

      <p class="note" data-i18n="note">Dùng tốt trên điện thoại và máy tính.</p>
    </section>

    <footer>Design by Chinh Anh from Rhema</footer>
  </main>

  <script>
    const html = document.documentElement;
    const langBtn = document.getElementById('langBtn');
    const themeBtn = document.getElementById('themeBtn');
    const mainBtn = document.getElementById('mainBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const timerEl = document.getElementById('timer');
    const hintEl = document.getElementById('hint');
    const fileTitle = document.getElementById('fileTitle');
    const fileMeta = document.getElementById('fileMeta');
    const player = document.getElementById('player');
    const meterFill = document.getElementById('meterFill');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');

    const dict = {
      vi: {
        title: 'Ghi âm WAV',
        subtitle: 'Bấm ghi âm, nói xong thì dừng và tải file xuống.',
        note: 'Dùng tốt trên điện thoại và máy tính.',
        statusReady: 'Sẵn sàng',
        statusRecording: 'Đang ghi âm',
        statusDone: 'Đã ghi xong',
        statusFail: 'Chưa thể ghi âm',
        statusUnsupported: 'Không hỗ trợ',
        hintIdle: 'Cho phép dùng microphone khi trình duyệt hỏi.',
        hintAsking: 'Đang xin quyền microphone...',
        hintRecording: 'Nói xong thì bấm Dừng ghi âm.',
        hintDone: 'Bạn có thể nghe lại hoặc tải file xuống.',
        hintDownloaded: 'File WAV đang được tải xuống máy của bạn.',
        hintReset: 'Bấm ghi âm để bắt đầu bản ghi mới.',
        hintNoData: 'Không có dữ liệu âm thanh. Hãy thử ghi lại.',
        hintError: 'Không mở được microphone. Hãy kiểm tra quyền truy cập rồi thử lại.',
        hintUnsupported: 'Trình duyệt này chưa hỗ trợ ghi âm web đầy đủ. Hãy dùng Chrome, Edge hoặc Safari mới.',
        mainStart: 'Bắt đầu ghi âm',
        mainStop: 'Dừng ghi âm',
        mainAgain: 'Ghi âm lại',
        download: 'Tải file WAV',
        reset: 'Xóa bản ghi',
        noFile: 'Chưa có bản ghi',
        noFileMeta: 'Sau khi dừng ghi, file sẽ hiện ở đây.',
        fileMetaSuffix: 'WAV mono'
      },
      en: {
        title: 'WAV Recorder',
        subtitle: 'Tap record, finish speaking, then stop and download the file.',
        note: 'Works well on phone and desktop.',
        statusReady: 'Ready',
        statusRecording: 'Recording',
        statusDone: 'Done',
        statusFail: 'Cannot record',
        statusUnsupported: 'Not supported',
        hintIdle: 'Allow microphone access when your browser asks.',
        hintAsking: 'Requesting microphone access...',
        hintRecording: 'When you finish speaking, tap Stop recording.',
        hintDone: 'You can listen again or download the file.',
        hintDownloaded: 'Your WAV file is being downloaded.',
        hintReset: 'Tap record to start a new recording.',
        hintNoData: 'No audio data was captured. Please try again.',
        hintError: 'Microphone access failed. Please check permission and try again.',
        hintUnsupported: 'This browser does not fully support web recording. Please use a recent Chrome, Edge, or Safari.',
        mainStart: 'Start recording',
        mainStop: 'Stop recording',
        mainAgain: 'Record again',
        download: 'Download WAV',
        reset: 'Delete recording',
        noFile: 'No recording yet',
        noFileMeta: 'Your file will appear here after you stop recording.',
        fileMetaSuffix: 'mono WAV'
      }
    };

    let lang = 'vi';
    let audioContext;
    let mediaStream;
    let sourceNode;
    let processorNode;
    let analyser;
    let monitorData;
    let pcmChunks = [];
    let recording = false;
    let startTime = 0;
    let timerHandle = null;
    let meterHandle = null;
    let wavBlob = null;
    let wavUrl = null;
    let sampleRate = 44100;
    let fileName = '';
    let currentStatusKey = 'statusReady';
    let currentHintKey = 'hintIdle';

    const t = (key) => dict[lang][key] || key;

    function renderStaticText() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      downloadBtn.textContent = t('download');
      resetBtn.textContent = t('reset');
      langBtn.textContent = lang === 'vi' ? 'EN' : 'VI';
      html.lang = lang;
      updateDynamicText();
      renderThemeButton();
    }

    function updateDynamicText() {
      statusText.textContent = t(currentStatusKey);
      hintEl.textContent = t(currentHintKey);
      if (!recording && !wavBlob) {
        mainBtn.textContent = t('mainStart');
        fileTitle.textContent = t('noFile');
        fileMeta.textContent = t('noFileMeta');
      }
      if (!recording && wavBlob && mainBtn.dataset.state !== 'again') {
        mainBtn.textContent = t('mainStart');
      }
      if (mainBtn.dataset.state === 'stop') mainBtn.textContent = t('mainStop');
      if (mainBtn.dataset.state === 'again') mainBtn.textContent = t('mainAgain');
      if (wavBlob && fileMeta.dataset.size) {
        fileMeta.textContent = `${fileMeta.dataset.size} · ${t('fileMetaSuffix')}`;
      }
    }

    function renderThemeButton() {
      const dark = html.getAttribute('data-theme') === 'dark';
      themeBtn.textContent = dark ? '☀️' : '🌙';
    }

    function setStatus(type, key) {
      currentStatusKey = key;
      statusEl.className = 'status';
      if (type) statusEl.classList.add(type);
      statusText.textContent = t(key);
    }

    function setHint(key) {
      currentHintKey = key;
      hintEl.textContent = t(key);
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const seconds = String(totalSeconds % 60).padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function updateTimer() {
      timerEl.textContent = formatTime(Date.now() - startTime);
    }

    function clearResult() {
      if (wavUrl) URL.revokeObjectURL(wavUrl);
      wavBlob = null;
      wavUrl = null;
      fileName = '';
      player.hidden = true;
      player.pause();
      player.removeAttribute('src');
      player.load();
      fileTitle.textContent = t('noFile');
      fileMeta.textContent = t('noFileMeta');
      delete fileMeta.dataset.size;
      downloadBtn.disabled = true;
      resetBtn.disabled = true;
      setStatus('', 'statusReady');
    }

    function mergeFloat32(chunks) {
      const length = chunks.reduce((sum, arr) => sum + arr.length, 0);
      const result = new Float32Array(length);
      let offset = 0;
      for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
      }
      return result;
    }

    function encodeWav(samples, sr) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);
      const writeString = (offset, string) => {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sr, true);
      view.setUint32(28, sr * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, samples.length * 2, true);
      let offset = 44;
      for (let i = 0; i < samples.length; i++, offset += 2) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
      return new Blob([view], { type: 'audio/wav' });
    }

    function stopTracks() {
      if (processorNode) processorNode.disconnect();
      if (sourceNode) sourceNode.disconnect();
      if (analyser) analyser.disconnect();
      if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
      processorNode = null;
      sourceNode = null;
      analyser = null;
      mediaStream = null;
    }

    function stopVisuals() {
      if (timerHandle) clearInterval(timerHandle);
      if (meterHandle) cancelAnimationFrame(meterHandle);
      timerHandle = null;
      meterHandle = null;
      meterFill.style.width = '6%';
    }

    function monitorLevel() {
      if (!analyser || !monitorData || !recording) return;
      analyser.getByteTimeDomainData(monitorData);
      let sumSquares = 0;
      for (let i = 0; i < monitorData.length; i++) {
        const normalized = (monitorData[i] - 128) / 128;
        sumSquares += normalized * normalized;
      }
      const rms = Math.sqrt(sumSquares / monitorData.length);
      meterFill.style.width = Math.max(6, Math.min(100, rms * 250)) + '%';
      meterHandle = requestAnimationFrame(monitorLevel);
    }

    async function startRecording() {
      try {
        clearResult();
        setHint('hintAsking');
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        sampleRate = audioContext.sampleRate;
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        monitorData = new Uint8Array(analyser.fftSize);
        processorNode = audioContext.createScriptProcessor(4096, 1, 1);
        pcmChunks = [];
        sourceNode.connect(analyser);
        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);
        processorNode.onaudioprocess = (event) => {
          if (!recording) return;
          pcmChunks.push(new Float32Array(event.inputBuffer.getChannelData(0)));
        };
        recording = true;
        startTime = Date.now();
        timerEl.textContent = '00:00';
        timerHandle = setInterval(updateTimer, 250);
        monitorLevel();
        mainBtn.dataset.state = 'stop';
        mainBtn.classList.add('stop');
        mainBtn.textContent = t('mainStop');
        resetBtn.disabled = false;
        setStatus('recording', 'statusRecording');
        setHint('hintRecording');
      } catch (e) {
        setHint('hintError');
        setStatus('', 'statusFail');
        stopTracks();
      }
    }

    function finishRecording() {
      recording = false;
      stopVisuals();
      stopTracks();
      const merged = mergeFloat32(pcmChunks);
      if (!merged.length) {
        setHint('hintNoData');
        mainBtn.dataset.state = 'start';
        mainBtn.textContent = t('mainStart');
        mainBtn.classList.remove('stop');
        return;
      }
      wavBlob = encodeWav(merged, sampleRate);
      wavUrl = URL.createObjectURL(wavBlob);
      const now = new Date();
      fileName = `recording-${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}.wav`;
      player.src = wavUrl;
      player.hidden = false;
      fileTitle.textContent = fileName;
      fileMeta.dataset.size = `${(wavBlob.size / 1024).toFixed(1)} KB`;
      fileMeta.textContent = `${fileMeta.dataset.size} · ${t('fileMetaSuffix')}`;
      downloadBtn.disabled = false;
      resetBtn.disabled = false;
      mainBtn.dataset.state = 'again';
      mainBtn.textContent = t('mainAgain');
      mainBtn.classList.remove('stop');
      setStatus('ready', 'statusDone');
      setHint('hintDone');
    }

    function toggleRecording() {
      if (recording) finishRecording();
      else startRecording();
    }

    function resetRecording() {
      if (recording) return;
      clearResult();
      timerEl.textContent = '00:00';
      setHint('hintReset');
      mainBtn.dataset.state = 'start';
      mainBtn.textContent = t('mainStart');
      mainBtn.classList.remove('stop');
    }

    function downloadRecording() {
      if (!wavBlob) return;
      const a = document.createElement('a');
      a.href = wavUrl;
      a.download = fileName || 'recording.wav';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setHint('hintDownloaded');
    }

    langBtn.addEventListener('click', () => {
      lang = lang === 'vi' ? 'en' : 'vi';
      renderStaticText();
    });

    themeBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      renderThemeButton();
    });

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !(window.AudioContext || window.webkitAudioContext)) {
      mainBtn.disabled = true;
      setHint('hintUnsupported');
      setStatus('', 'statusUnsupported');
    }

    mainBtn.dataset.state = 'start';
    mainBtn.addEventListener('click', toggleRecording);
    downloadBtn.addEventListener('click', downloadRecording);
    resetBtn.addEventListener('click', resetRecording);
    renderStaticText();
  </script>
</body>
</html>
